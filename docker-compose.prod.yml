services:
  db:
    image: postgres:15-alpine
    container_name: ubuntu-db-1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  backend:
    image: sanupdocker/my-devops-backend:latest
    container_name: ubuntu-backend-1
    build: ./backend
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/usr/src/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: sanupdocker/my-devops-frontend:latest
    container_name: ubuntu-frontend-1
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: ubuntu-prometheus-1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: ubuntu-grafana-1
    ports:
      - "3000:3000"

volumes:
  postgres_data: