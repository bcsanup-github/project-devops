version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=django_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    networks:
      - prod

  backend:
    image: sanupdocker/my-devops-backend:latest
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:postgres_password@db:5432/django_db
    networks:
      - prod

  frontend:
    image: sanupdocker/my-devops-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - prod

  # --- MONITORING SERVICES ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - prod

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - prod
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data: # Keep stats after restart
  grafana_data:    # Keep dashboards after restart

networks:
  prod: