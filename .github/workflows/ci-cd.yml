name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-analyze:
    name: Build, Test, and SonarCloud Scan
    runs-on: ubuntu-latest

    # ── Postgres is needed because Django connects to it during tests ──
    services:
      postgres:
        image: postgres:13.2-alpine
        env:
          POSTGRES_DB: django_test
          POSTGRES_USER: django
          POSTGRES_PASSWORD: django
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ── 1. Checkout (fetch-depth:0 required by SonarCloud) ──
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python + Django tests ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Run Django Tests
        working-directory: backend
        env:
          DEBUG: 1
          SECRET_KEY: ci-test-secret-key-not-real
          DJANGO_ALLOWED_HOSTS: localhost 127.0.0.1
          DJANGO_SETTINGS_MODULE: app.settings.local
          SQL_ENGINE: django.db.backends.postgresql
          SQL_DATABASE: django_test
          SQL_USER: django
          SQL_PASSWORD: django
          SQL_HOST: localhost
          SQL_PORT: 5432
          DATABASE: postgres
        run: python manage.py test

      # ── 3. Node + React tests ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"   # matches your Dockerfile.prod (node:18-slim)

      - name: Install Frontend Dependencies & Test
        working-directory: frontend
        run: |
          npm install
          npm test -- --watchAll=false --passWithNoTests

      # ── 4. SonarCloud scan ──
      # SONAR_TOKEN: go to sonarcloud.io → My Account → Security → Generate Token
      # Then: GitHub repo → Settings → Secrets and variables → Actions → New secret
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # free, auto-provided by GitHub, no setup needed
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # one-time setup on SonarCloud (see above)
        # All other config (projectKey, org, sources, exclusions)
        # is already in your sonar-project.properties at repo root ✅
