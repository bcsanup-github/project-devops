name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-analyze:
    name: Build, Test, and SonarCloud Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13.2-alpine
        env:
          POSTGRES_DB: django_test
          POSTGRES_USER: django
          POSTGRES_PASSWORD: django
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Run Django Tests
        working-directory: backend
        env:
          DEBUG: 1
          SECRET_KEY: ci-test-secret-key-not-real
          DJANGO_ALLOWED_HOSTS: localhost 127.0.0.1
          DJANGO_SETTINGS_MODULE: app.settings.local
          SQL_ENGINE: django.db.backends.postgresql
          SQL_DATABASE: django_test
          SQL_USER: django
          SQL_PASSWORD: django
          SQL_HOST: localhost
          SQL_PORT: 5432
          DATABASE: postgres
        run: python manage.py test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies & Test
        working-directory: frontend
        run: |
          npm install
          npm test -- --watchAll=false --passWithNoTests

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build-test-analyze  # Only runs if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- STEP 1: UPLOAD FILES ---
      - name: Copy Files to AWS Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          # List all files/folders needed for production
          source: "docker-compose.prod.yml,nginx/" 
          target: "/home/ubuntu/"

      # --- STEP 2: RUN COMMANDS ---
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu
            # Pull new images from Docker Hub
            sudo docker compose -f docker-compose.prod.yml pull
            # Restart containers in detached mode
            sudo docker compose -f docker-compose.prod.yml up -d
            echo "--- DOCKER STATUS ---"
            sudo docker ps
            echo "--- RECENT LOGS ---"
            sudo docker compose -f docker-compose.prod.yml logs --tail=20